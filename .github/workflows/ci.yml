name: CI

on:
  push:
    branches: ["main"]
    paths:
      - "USA_Housing.csv"
      - "Dockerfile"
      - "requirements.txt"
      - "app/**"
      - ".github/workflows/**"
  pull_request:
    branches: ["main"]
    paths:
      - "USA_Housing.csv"
      - "Dockerfile"
      - "requirements.txt"
      - "app/**"
      - ".github/workflows/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest

      - name: Retrain model
        run: |
          python app/train_model.py

      - name: Log in to Docker Hub
        uses: docker/login-action@v5
        with:
          registry: docker.io
          username: ${{ secrets.pdharamendra2005 }}
          password: ${{ secrets.Shipbourne@3600 }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ml-housing-api:latest,docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ml-housing-api:${{ github.sha }}
